<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    overflow: hidden;
    background: transparent;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  }
  #container {
    width: 420px;
    height: 310px;
    border-radius: 12px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    box-shadow: 0 8px 32px rgba(0,0,0,0.25);
  }

  /* ── Themes ── */
  .theme-peach #container {
    background: rgba(255,247,235,0.97);
    border: 2px solid rgba(242,140,165,0.8);
    color: #2d2830;
  }
  .theme-peach .titlebar { background: rgba(250,237,224,1); color: #d95973; }
  .theme-peach .separator { background: rgba(242,140,165,0.25); }
  .theme-peach .input-area { background: rgba(255,252,248,1); }
  .theme-peach .msg-user { background: rgba(217,89,115,0.1); }
  .theme-peach .msg-bot  { background: rgba(0,0,0,0.03); }
  .theme-peach .tool-use { color: #d95973; }
  .theme-peach .error    { color: #e63e2a; }

  .theme-midnight #container {
    background: rgba(18,18,18,0.96);
    border: 1.5px solid rgba(255,102,0,0.7);
    color: #fff;
  }
  .theme-midnight .titlebar { background: rgba(26,26,26,1); color: #ff6600; }
  .theme-midnight .separator { background: rgba(255,102,0,0.3); }
  .theme-midnight .input-area { background: rgba(31,31,31,1); }
  .theme-midnight .msg-user { background: rgba(255,102,0,0.08); }
  .theme-midnight .msg-bot  { background: rgba(255,255,255,0.03); }
  .theme-midnight .tool-use { color: #ff6600; }
  .theme-midnight .error    { color: #ff4d33; }
  .theme-midnight * { font-family: 'Cascadia Code', 'Consolas', monospace; }

  .theme-cloud #container {
    background: rgba(240,242,245,0.98);
    border: 1px solid rgba(200,204,214,0.6);
    color: #26263a;
  }
  .theme-cloud .titlebar { background: rgba(224,230,238,1); color: #4d4d59; }
  .theme-cloud .separator { background: rgba(200,210,220,0.4); }
  .theme-cloud .input-area { background: #fff; }
  .theme-cloud .msg-user { background: rgba(0,120,212,0.06); }
  .theme-cloud .msg-bot  { background: rgba(0,0,0,0.02); }
  .theme-cloud .tool-use { color: #0078d4; }
  .theme-cloud .error    { color: #d9362b; }

  .theme-moss #container {
    background: rgba(209,214,199,0.98);
    border: 2px solid rgba(140,148,128,0.8);
    color: #1a1f14;
  }
  .theme-moss .titlebar { background: rgba(184,191,174,1); color: #272d1f; }
  .theme-moss .separator { background: rgba(140,148,128,0.5); }
  .theme-moss .input-area { background: rgba(224,230,214,1); }
  .theme-moss .msg-user { background: rgba(50,60,40,0.07); }
  .theme-moss .msg-bot  { background: rgba(255,255,255,0.1); }
  .theme-moss .tool-use { color: #374028; }
  .theme-moss .error    { color: #993322; }

  /* ── Layout ── */
  .titlebar {
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 12px;
    font-size: 10px;
    font-weight: 800;
    letter-spacing: 1px;
    text-transform: uppercase;
    flex-shrink: 0;
    -webkit-app-region: drag;
  }
  .titlebar-buttons {
    display: flex;
    gap: 6px;
    -webkit-app-region: no-drag;
  }
  .titlebar-buttons button {
    background: none;
    border: none;
    cursor: pointer;
    opacity: 0.5;
    color: inherit;
    font-size: 13px;
    padding: 2px;
  }
  .titlebar-buttons button:hover { opacity: 1; }
  .separator { height: 1px; flex-shrink: 0; }

  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 10px 14px;
    font-size: 12px;
    line-height: 1.5;
    scroll-behavior: smooth;
  }
  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-thumb { background: rgba(128,128,128,0.3); border-radius: 2px; }

  .msg {
    margin-bottom: 8px;
    padding: 6px 10px;
    border-radius: 8px;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .msg-user { font-weight: 600; }
  .tool-use {
    font-size: 10px;
    opacity: 0.7;
    padding: 3px 10px;
    margin-bottom: 4px;
  }
  .error { font-weight: 600; }

  .input-area {
    display: flex;
    align-items: center;
    padding: 8px 12px;
    flex-shrink: 0;
    border-top: 1px solid rgba(128,128,128,0.1);
  }
  #input {
    flex: 1;
    border: none;
    outline: none;
    background: transparent;
    font-size: 12px;
    color: inherit;
    font-family: inherit;
  }
  #input::placeholder { color: rgba(128,128,128,0.5); }
</style>
</head>
<body class="theme-peach">
<div id="container">
  <div class="titlebar">
    <span id="title"></span>
    <div class="titlebar-buttons">
      <button id="btn-refresh" title="Reset session">↻</button>
      <button id="btn-copy" title="Copy last response">⧉</button>
    </div>
  </div>
  <div class="separator"></div>
  <div id="messages"></div>
  <div class="input-area">
    <input id="input" placeholder="Ask Claude..." autofocus>
  </div>
</div>
<script>
  const params = new URLSearchParams(window.location.search);
  const agentName = params.get('name') || 'Agent';
  let theme = (params.get('theme') || 'Peach').toLowerCase();

  document.body.className = `theme-${theme}`;
  document.getElementById('title').textContent = `${agentName} — Claude`;

  const messages = document.getElementById('messages');
  const input = document.getElementById('input');
  let currentStreamEl = null;
  let lastAssistantText = '';

  function appendMsg(role, text) {
    const div = document.createElement('div');
    div.className = `msg msg-${role}`;
    div.textContent = text;
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
    return div;
  }

  function appendToolUse(name, summary) {
    const div = document.createElement('div');
    div.className = 'tool-use';
    div.textContent = `⚙ ${name}: ${summary}`;
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
  }

  // Send user message
  input.addEventListener('keydown', (e) => {
    if (e.key !== 'Enter' || !input.value.trim()) return;
    const text = input.value.trim();
    input.value = '';

    // Handle slash commands
    if (text === '/clear') {
      window.lilAgents.resetSession();
      messages.innerHTML = '';
      currentStreamEl = null;
      return;
    }
    if (text === '/copy') {
      if (lastAssistantText) navigator.clipboard.writeText(lastAssistantText);
      return;
    }

    appendMsg('user', text);
    currentStreamEl = null;
    window.lilAgents.sendMessage(text);
  });

  // Receive CLI data
  window.lilAgents.onCliData((json) => {
    if (json.type === 'assistant' && json.message?.content) {
      for (const block of json.message.content) {
        if (block.type === 'text' && block.text) {
          if (!currentStreamEl) {
            currentStreamEl = appendMsg('bot', '');
            lastAssistantText = '';
          }
          currentStreamEl.textContent += block.text;
          lastAssistantText += block.text;
          messages.scrollTop = messages.scrollHeight;
        }
        if (block.type === 'tool_use') {
          const toolName = block.name || 'Tool';
          const inp = block.input || {};
          const summary = inp.command || inp.file_path || inp.pattern || Object.keys(inp).slice(0,3).join(', ');
          appendToolUse(toolName, summary);
        }
      }
    }
    if (json.type === 'user' && json.message?.content) {
      for (const block of json.message.content) {
        if (block.type === 'tool_result') {
          const isError = block.is_error;
          if (isError) appendMsg('error', '✕ Tool error');
        }
      }
    }
    if (json.type === 'result') {
      currentStreamEl = null;
    }
  });

  window.lilAgents.onCliError((text) => {
    // Don't show stderr noise, only real errors
    if (text.includes('Error') || text.includes('error')) {
      appendMsg('error', text.trim());
    }
  });

  window.lilAgents.onCliExit(() => {
    appendMsg('error', 'Session ended.');
    currentStreamEl = null;
  });

  window.lilAgents.onThemeChange((t) => {
    theme = t.toLowerCase();
    document.body.className = `theme-${theme}`;
  });

  // Buttons
  document.getElementById('btn-refresh').addEventListener('click', () => {
    window.lilAgents.resetSession();
    messages.innerHTML = '';
    currentStreamEl = null;
  });
  document.getElementById('btn-copy').addEventListener('click', () => {
    if (lastAssistantText) navigator.clipboard.writeText(lastAssistantText);
  });

  // Welcome
  appendMsg('bot', `hey! i'm ${agentName.toLowerCase()}. ask me anything.`);
</script>
</body>
</html>
