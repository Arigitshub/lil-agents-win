<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; }
  html, body { overflow: hidden; background: transparent; }
  body {
    cursor: pointer;
    -webkit-app-region: no-drag;
    user-select: none;
  }
  #container { position: relative; width: 100vw; height: 100vh; }
  #video {
    width: 100%;
    height: 100%;
    object-fit: contain;
    pointer-events: none;
  }
  #bubble {
    position: absolute;
    top: 2px;
    left: 50%;
    transform: translateX(-50%);
    padding: 3px 10px;
    border-radius: 10px;
    font-family: 'Segoe UI', system-ui, sans-serif;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    white-space: nowrap;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
    background: rgba(255,245,235,0.95);
    border: 1.5px solid rgba(242,140,165,0.6);
    color: #555;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  }
  #bubble.visible { opacity: 1; }
  #bubble.completion {
    border-color: rgba(60,180,80,0.7);
    color: #2a8a3a;
  }
</style>
</head>
<body>
<div id="container">
  <div id="bubble"></div>
  <video id="video" muted playsinline></video>
</div>
<script>
  const params = new URLSearchParams(window.location.search);
  const videoFile = params.get('video');
  const name = params.get('name');
  const video = document.getElementById('video');
  const bubble = document.getElementById('bubble');

  video.src = `../public/assets/${videoFile}`;
  video.loop = true;

  const thinkingPhrases = [
    'hmm...', 'thinking...', 'one sec...', 'ok hold on',
    'let me check', 'working on it', 'almost...', 'bear with me',
    'on it!', 'gimme a sec', 'brb', 'processing...',
    'hang tight', 'just a moment', 'figuring it out',
    'cooking...', 'vibing...', 'digging in',
    'connecting dots', 'give me a sec',
    "don't rush me", 'calculating...', 'assembling…'
  ];
  const completionPhrases = [
    'done!', 'all set!', 'ready!', 'here you go', 'got it!',
    'finished!', 'ta-da!', 'voila!',
    'boom!', 'there ya go!', 'check it out!'
  ];

  let isThinking = false;
  let phraseInterval = null;

  function showRandomPhrase() {
    const phrase = thinkingPhrases[Math.floor(Math.random() * thinkingPhrases.length)];
    bubble.textContent = phrase;
    bubble.className = 'visible';
  }

  document.body.addEventListener('click', () => {
    window.lilAgents.characterClicked();
  });

  window.lilAgents.onWalk((data) => {
    if (data.playing) {
      video.currentTime = 0;
      video.play().catch(() => {});
    } else {
      video.pause();
      video.currentTime = 0;
    }
    video.style.transform = data.goingRight ? 'scaleX(1)' : 'scaleX(-1)';
  });

  window.lilAgents.onThinking((val) => {
    isThinking = val;
    if (val) {
      showRandomPhrase();
      phraseInterval = setInterval(showRandomPhrase, 3500);
    } else {
      clearInterval(phraseInterval);
      bubble.className = '';
    }
  });

  window.lilAgents.onCompletion(() => {
    clearInterval(phraseInterval);
    isThinking = false;
    const phrase = completionPhrases[Math.floor(Math.random() * completionPhrases.length)];
    bubble.textContent = phrase;
    bubble.className = 'visible completion';
    setTimeout(() => { bubble.className = ''; }, 3000);
  });
</script>
</body>
</html>
